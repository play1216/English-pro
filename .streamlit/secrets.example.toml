DEEPSEEK_API_KEY = "your_deepseek_api_key"

# 爱发电开放平台配置
AFDIAN_USER_ID = "your_afdian_user_id"
AFDIAN_TOKEN = "your_afdian_token"
AFDIAN_PAYMENT_URL = "https://afdian.net/a/your_creator_page"

# 可选：限制只认某个会员套餐名称
AFDIAN_PLAN_TITLE = "作文会员"

# 可选：套餐名称关键词（逗号分隔，命中任意一个即可）
# AFDIAN_PLAN_KEYWORDS = "作文,会员,批改"

# 可选：会员有效天数（默认 31 天）
# MEMBERSHIP_DAYS = 31

# 可选：把 OCR API 配置也放到 secrets 中，避免密钥落盘到本地文件
# [OCR_CONFIG.apis.google_vision]
